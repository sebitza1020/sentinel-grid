name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend (Quarkus / Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # clean verify runs Spotless (check) + surefire tests (unit + @QuarkusTest).
      # Integration tests stay skipped (skipITs=true) unless the native profile is active.
      - name: Build, format-check and test
        run: ./mvnw -B --no-transfer-progress clean verify

  frontend-build:
    name: Frontend (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Angular's default configuration is production: AOT + strict template checking.
      - name: Build (production AOT)
        run: npm run build

      - name: Unit tests
        run: npm run test:ci
