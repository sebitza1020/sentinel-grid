# 1. Datasource Configuration (Neon.tech)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}
# --- Connection pool tuning for Neon serverless (scale-to-zero) ---
# Neon suspends its compute when idle and needs several seconds to wake on the
# first connection. Agroal's default acquisition-timeout is 5s, which expires
# before Neon is ready and crashes startup with "Acquisition timeout while
# waiting for new connection". Give it enough time to wake. Overridable via
# DB_ACQUISITION_TIMEOUT (e.g. "45S").
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:30S}
# Don't pre-open or hold idle connections: Neon closes them when it suspends,
# so a held connection goes stale. Open lazily and let idle ones be reclaimed.
quarkus.datasource.jdbc.initial-size=0
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=10
# Validate connections so a stale one (closed by Neon during suspend) is
# detected and replaced instead of handed out and failing a live request.
quarkus.datasource.jdbc.background-validation-interval=2M
quarkus.datasource.jdbc.validation-query-sql=SELECT 1
# 2. Hibernate / Panache (ORM)
# În DEV și TEST, vrem ca Quarkus să actualizeze schema automat dacă modificăm codul Java.
# În PROD, vom pune "validate" sau "none".
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
# 3. HTTP Configuration
quarkus.http.port=8080
# 4. Firebase Emulator Configuration
firebase.database.url=${FIREBASE_DATABASE_URL}
firebase.emulator.host=${FIREBASE_EMULATOR_HOST}
# Google Apps Script Webhook
quarkus.rest-client.google-alert-api.url=https://script.google.com/macros/s/AKfycbxBnli-TUPmHEgUOrEeo6hxeyZAjdX_Xnf9VRmqLeRumUUg3QV6XRRhb-ZXMWuSIeIXhg/exec
quarkus.rest-client.google-alert-api.scope=jakarta.inject.Singleton
# --- Local AI (Ollama) ---
# Base URL is env-overridable (OLLAMA_API_URL) so prod can point at a hosted
# Ollama; defaults to a local instance for development.
quarkus.rest-client.ollama-api.url=${OLLAMA_API_URL:http://localhost:11434/api}
# Model is overridable via OLLAMA_MODEL env var.
ollama.model=gemma4:12b
# --- AI Engine Router ---
# Which backend analyzes drone reports: "ollama" (local weights) or "groq" (hosted).
# Dev defaults to ollama; prod (Render) can't load local weights, so %prod uses groq.
sentinel.ai.engine=ollama
%prod.sentinel.ai.engine=groq
# Groq — OpenAI-compatible chat completions. URL + key are env-overridable; the key
# defaults to empty so dev/test/CI boot never fails on a missing GROQ_API_KEY.
quarkus.rest-client.groq-api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.1-8b-instant
# --- Weather cache ---
# How long an Open-Meteo result is reused before refetch (ms). Reduces upstream
# calls to avoid HTTP 429 rate limiting. Override via WEATHER_CACHE_TTL_MILLIS.
weather.cache.ttl-millis=600000
# --- CORS CONFIGURATION (PRECISION STRIKE) ---
quarkus.http.cors=true
# Punem EXACT adresa frontend-ului tău (copiată din eroarea ta)
quarkus.http.cors.origins=https://sentinel-dashboard-d0fw.onrender.com
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
# Acum putem activa credențialele în siguranță, pentru că originea e specifică
quarkus.http.cors.access-control-allow-credentials=true
# --- SECURITY CONFIG ---
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://sentinel-grid.com
quarkus.smallrye-jwt.enabled=true
# --- TEST PROFILE (%test) ---
# Lets @QuarkusTest boot in CI without any external services. The datasource and
# Hibernate are inactive (no test hits Panache; only FirebaseService is eager and
# it doesn't touch the DB). Setting a Firebase emulator host forces FirebaseService
# down its emulator branch (GoogleCredentials.create(null)), so it never tries to
# read the prod credentials file that would otherwise crash startup.
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.firebase.database.url=https://sentinel-grid-test.firebaseio.com
%test.firebase.emulator.host=127.0.0.1:9000