server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types application/javascript application/json image/svg+xml text/css text/plain;

  add_header Content-Security-Policy "default-src 'self'; worker-src blob:; img-src 'self' data: blob: https://api.mapbox.com https://image.pollinations.ai; connect-src 'self' http://localhost:8080 ws://localhost:8080 https://sentinel-api-kh1p.onrender.com wss://sentinel-api-kh1p.onrender.com https://api.mapbox.com https://events.mapbox.com; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data: https://api.mapbox.com; frame-ancestors 'self';" always;

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location = /runtime-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location ~* "^/.*-[a-z0-9]{8,}\.(?:css|js|png|jpg|jpeg|gif|svg|webp|woff|woff2)$" {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
